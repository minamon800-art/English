<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語一問一答アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 10px #0000001a; }
        button { font-size: 18px; padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .start-btn { background: #4CAF50; color: white; }
        .rec-btn { background: #f44336; color: white; }
        .result { text-align: left; background: #eee; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>英語一問一答（Gemini版）</h2>
    
    <input type="password" id="apiKey" placeholder="Gemini APIキーを入力" style="width:80%; padding:8px; margin-bottom:20px;"><br>

    <button class="start-btn" id="startBtn">質問をスタート</button>
    <button class="rec-btn" id="recBtn" disabled>タップして返答する</button>

    <h3 id="questionText">質問がここに表示されます</h3>
    <div class="result" id="resultArea">ここに採点結果が表示されます</div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let currentQuestion = "";
    let isRecording = false;
    const apiKeyInput = document.getElementById('apiKey');
    const recBtn = document.getElementById('recBtn');

    document.getElementById('startBtn').addEventListener('click', () => {
        const questions = [
            "What did you do last weekend?",
            "What is your favorite food and why?",
            "How do you usually spend your holidays?"
        ];
        currentQuestion = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('questionText').innerText = currentQuestion;

        const uttr = new SpeechSynthesisUtterance(currentQuestion);
        uttr.lang = "en-US";
        window.speechSynthesis.speak(uttr);

        recBtn.disabled = false;
        recBtn.innerText = "タップして返答する";
        recBtn.style.background = "#f44336";
    });

    recBtn.addEventListener('click', async () => {
        if (!isRecording) {
            await startRecording();
        } else {
            stopRecording();
        }
    });

    async function startRecording() {
        audioChunks = [];
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            let options = { mimeType: 'audio/webm' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'audio/mp4' };
            }
            
            mediaRecorder = new MediaRecorder(stream, options);
            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };
            mediaRecorder.onstop = sendToGemini;
            
            mediaRecorder.start();
            isRecording = true;
            recBtn.innerText = "■ 録音中...（もう一度タップして終了）";
            recBtn.style.background = "#333";
        } catch (err) {
            console.error(err);
            alert("マイクの起動に失敗しました: " + err.message);
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;
            recBtn.innerText = "解析中...";
        }
    }

    async function sendToGemini() {
        const apiKey = apiKeyInput.value;
        if (!apiKey) {
            alert("APIキーを入力してください");
            recBtn.innerText = "タップして返答する";
            recBtn.style.background = "#f44336";
            return;
        }

        if (audioChunks.length === 0) {
            alert("音声データが空です。もう一度録音してください。");
            recBtn.innerText = "タップして返答する";
            return;
        }
        const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];

            const promptText = `
            あなたは優秀な英語教師です。
            質問「${currentQuestion}」に対して、添付された音声で生徒が英語で返答しました。
            音声を聞き取り、以下の3項目について各5点満点（合計15点満点）で厳しく採点し、日本語でフィードバックをしてください。

            ■フィードバック項目
            ・イントネーション（発音の上がり下がり、自然さ）：〇/5点
            ・返答内容（文法、質問に対する適切さ）：〇/5点
            ・ニュアンス,トーン、テンション（声の明るさや感情のノリ）：〇/5点
            合計：〇/15点

            最後に、各項目ごとに具体的な改善提案を日本語で箇条書きで書いてください。
            `;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: mediaRecorder.mimeType, data: base64Audio } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const resultText = data.candidates[0].content.parts[0].text;
                    document.getElementById('resultArea').innerText = resultText;
                } else {
                    document.getElementById('resultArea').innerText = "APIからの返答が空でした。";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('resultArea').innerText = "エラーが発生しました。";
            }
            recBtn.innerText = "タップして返答する";
            recBtn.style.background = "#f44336";
        };
    }
</script>

</body>
</html>
